name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-barcode pillow customtkinter pyinstaller qrcode

    - name: Prepare Font
      # 💡 윈도우 시스템 폴더에서 폰트를 현재 작업 폴더로 복사합니다.
      run: copy C:\Windows\Fonts\arial.ttf .

    - name: Build with PyInstaller
      # 💡 복사해온 폰트를 포함하여 단일 파일(.exe)로 조립합니다.
      run: pyinstaller --noconsole --onefile --add-data "arial.ttf;." barcode_app.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: barcode-maker-v4-exe
        path: dist/barcode_app.exe
