name: Build EXE v5.2

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-barcode pillow customtkinter pyinstaller qrcode pywin32

    - name: Prepare Fonts
      # 💡 Arial은 깃허브 서버에 기본으로 있으니 복사합니다.
      # ⚠️ malgun.ttf는 룩희님 깃허브 저장소에 직접 업로드해 두셨어야 합니다!
      run: |
        copy C:\Windows\Fonts\arial.ttf .

    - name: Build with PyInstaller
      # 💡 [핵심] 폰트 2개(arial, malgun)와 logistic_future.jpg 이미지를 모두 EXE에 포함합니다.
      # 파일 이름을 Warehouse_Pro_v5.2로 명시합니다.
      run: pyinstaller --noconsole --onefile --add-data "arial.ttf;." --add-data "malgun.ttf;." --add-data "logistic_future.jpg;." --name "Warehouse_Pro_v5.2" barcode_app.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Warehouse_Pro_v5.2_EXE
        path: dist/Warehouse_Pro_v5.2.exe
