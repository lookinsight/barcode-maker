name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-barcode pillow customtkinter pyinstaller qrcode pywin32

    - name: Prepare Font (Arial)
      # 💡 Arial은 깃허브 로봇 컴퓨터에 기본으로 있으니 복사해 오라고 시킵니다.
      run: copy C:\Windows\Fonts\arial.ttf .

    - name: Build with PyInstaller
      # 💡 [핵심] arial, malgun, 배경 이미지까지 3개를 몽땅 EXE 안에 묶어서 포장합니다!
      run: pyinstaller --noconsole --onefile --add-data "arial.ttf;." --add-data "malgun.ttf;." --add-data "logistic_future.jpg;." --name "Warehouse_Pro_v5.1" barcode_app.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Warehouse_Pro_v5.1_EXE
        path: dist/Warehouse_Pro_v5.1.exe
