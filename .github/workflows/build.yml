name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-barcode pillow customtkinter pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller --noconsole --onefile barcode_app.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: barcode-maker-exe
        path: dist/barcode_app.exe
