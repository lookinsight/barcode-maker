name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
  
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 💡 [요청사항 반영] QR 코드 생성을 위해 qrcode 라이브러리 추가 설치
        pip install python-barcode pillow customtkinter pyinstaller qrcode

    - name: Build with PyInstaller
      # 💡 [요청사항 반영] arial.ttf 폰트 파일과 seoul_night.jpg 사진 파일을 프로그램 안에 심습니다.
      run: pyinstaller --noconsole --onefile --add-data "arial.ttf;." --add-data "seoul_night.jpg;." barcode_app.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: barcode-maker-seoul-exe # 산출물 파일 이름을 세련되게 변경
        path: dist/barcode_app.exe
