name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-barcode pillow customtkinter pyinstaller qrcode

    - name: Prepare Font
      # 💡 [핵심 복구] 윈도우 시스템에서 폰트를 복사해오는 단계입니다. 이 부분이 빠지면 에러가 납니다!
      run: copy C:\Windows\Fonts\arial.ttf .

    - name: Build with PyInstaller
      # 💡 폰트와 서울 야경 사진을 한 번에 묶어서 exe 파일로 만듭니다.
      run: pyinstaller --noconsole --onefile --add-data "arial.ttf;." --add-data "logistic_future.jpg;." barcode_app.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: barcode-maker-seoul-exe
        path: dist/barcode_app.exe
